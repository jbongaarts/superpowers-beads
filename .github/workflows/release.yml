name: Release

on:
  push:
    tags:
      - 'v*.*.*'         # stable release: v0.2.0
      - 'v*.*.*-*'       # pre-release: v0.2.0-rc1, v0.2.0-beta.2, etc.

permissions:
  contents: write       # create GitHub Release
  attestations: write   # actions/attest-build-provenance
  id-token: write       # OIDC token for attestation

env:
  BD_VERSION: 1.0.3

jobs:
  release:
    name: Tag release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Verify tag matches plugin version
        id: tag
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          # Strip pre-release suffix (e.g. -rc1, -beta.2) so v0.2.0-rc1 matches plugin version 0.2.0.
          base="${tag%%-*}"
          if [ "$tag" = "$base" ]; then
            prerelease=false
          else
            prerelease=true
          fi
          plugin_version="$(jq -r '.version' plugins/superpowers-beads/.claude-plugin/plugin.json)"
          if [ "$base" != "$plugin_version" ]; then
            echo "Tag $GITHUB_REF_NAME (base $base) does not match plugin version $plugin_version" >&2
            echo "Bump version in marketplace.json + plugin.json (Claude + Codex) before tagging." >&2
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches plugin version $plugin_version (prerelease=$prerelease)"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install bd
        run: |
          set -euo pipefail
          asset="beads_${BD_VERSION}_linux_amd64.tar.gz"
          base="https://github.com/gastownhall/beads/releases/download/v${BD_VERSION}"
          tmpdir="$(mktemp -d)"
          curl -fsSL "${base}/${asset}" -o "${tmpdir}/${asset}"
          curl -fsSL "${base}/checksums.txt" -o "${tmpdir}/checksums.txt"
          (cd "${tmpdir}" && grep " ${asset}\$" checksums.txt | sha256sum -c -)
          tar -C "${tmpdir}" -xzf "${tmpdir}/${asset}"
          sudo install -m 0755 "${tmpdir}/bd" /usr/local/bin/bd
          bd --version

      - name: Bootstrap beads database from Dolt remote
        run: bd bootstrap --yes --quiet

      - name: Run plugin preflight
        run: scripts/preflight.sh

      - name: Build source archive
        id: archive
        run: |
          set -euo pipefail
          name="superpowers-beads-${GITHUB_REF_NAME}"
          archive="${name}.tar.gz"
          git archive --format=tar.gz --prefix="${name}/" -o "${archive}" "${GITHUB_REF_NAME}"
          sha256sum "${archive}" > "${archive}.sha256"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.archive.outputs.archive }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ steps.tag.outputs.prerelease }}
        run: |
          set -euo pipefail
          prerelease_flag=""
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          # shellcheck disable=SC2086
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            $prerelease_flag \
            "${{ steps.archive.outputs.archive }}" \
            "${{ steps.archive.outputs.checksum }}"
