name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write       # create GitHub Release
  attestations: write   # actions/attest-build-provenance
  id-token: write       # OIDC token for attestation

env:
  BD_VERSION: 1.0.3

jobs:
  release:
    name: Tag release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify tag matches plugin version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          plugin_version="$(jq -r '.version' plugins/superpowers-beads/.claude-plugin/plugin.json)"
          if [ "$tag" != "$plugin_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match plugin version $plugin_version" >&2
            echo "Bump version in marketplace.json + plugin.json (Claude + Codex) before tagging." >&2
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches plugin version $plugin_version"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install bd
        run: |
          set -euo pipefail
          asset="beads_${BD_VERSION}_linux_amd64.tar.gz"
          base="https://github.com/gastownhall/beads/releases/download/v${BD_VERSION}"
          tmpdir="$(mktemp -d)"
          curl -fsSL "${base}/${asset}" -o "${tmpdir}/${asset}"
          curl -fsSL "${base}/checksums.txt" -o "${tmpdir}/checksums.txt"
          (cd "${tmpdir}" && grep " ${asset}\$" checksums.txt | sha256sum -c -)
          tar -C "${tmpdir}" -xzf "${tmpdir}/${asset}"
          sudo install -m 0755 "${tmpdir}/bd" /usr/local/bin/bd
          bd --version

      - name: Hydrate beads database from .beads/issues.jsonl
        run: bd init --non-interactive --quiet --skip-agents --skip-hooks --from-jsonl

      - name: Run plugin preflight
        run: scripts/preflight.sh

      - name: Build source archive
        id: archive
        run: |
          set -euo pipefail
          name="superpowers-beads-${GITHUB_REF_NAME}"
          archive="${name}.tar.gz"
          git archive --format=tar.gz --prefix="${name}/" -o "${archive}" "${GITHUB_REF_NAME}"
          sha256sum "${archive}" > "${archive}.sha256"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.sha256" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.archive.outputs.archive }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "${{ steps.archive.outputs.archive }}" \
            "${{ steps.archive.outputs.checksum }}"
