name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  BD_VERSION: 1.0.3

jobs:
  preflight:
    # Display name kept as "Claude plugin validate" so the existing branch
    # protection required-status-check still matches. The job now runs the
    # full plugin preflight (claude validate + bd checks + helper scripts).
    name: Claude plugin validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install bd
        run: |
          set -euo pipefail
          asset="beads_${BD_VERSION}_linux_amd64.tar.gz"
          base="https://github.com/gastownhall/beads/releases/download/v${BD_VERSION}"
          tmpdir="$(mktemp -d)"
          curl -fsSL "${base}/${asset}" -o "${tmpdir}/${asset}"
          curl -fsSL "${base}/checksums.txt" -o "${tmpdir}/checksums.txt"
          (cd "${tmpdir}" && grep " ${asset}\$" checksums.txt | sha256sum -c -)
          tar -C "${tmpdir}" -xzf "${tmpdir}/${asset}"
          sudo install -m 0755 "${tmpdir}/bd" /usr/local/bin/bd
          bd --version

      - name: Bootstrap beads database from Dolt remote
        run: |
          # The embedded Dolt database is gitignored, so clone it from the
          # Dolt ref on origin before preflight runs bd commands.
          bd bootstrap --yes --quiet

      - name: Run plugin preflight
        env:
          # Comma-separated allowlist of beads that may be in_progress without
          # failing CI. preflight.sh fails if any bead outside the allowlist
          # is in_progress. Remove entries as the underlying work merges:
          # - superpowers-beads-isu: matrix runner speedup verification
          # - superpowers-beads-ei7: GH Actions Node 24 bump
          ALLOW_IN_PROGRESS: superpowers-beads-isu,superpowers-beads-ei7
        run: scripts/preflight.sh
